<!DOCTYPE html>

<head>

  <title><!-- YOUR NAME --> — Consultant</title>
  <style>
    /* TODO: Change --color to match your personal brand */
    :root {
      --color: #0891B2;
      --color-dark: #0e7490;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F8F9FA; color:#1a1a2e; }

    /* HERO */
    .hero { background:var(--color); color:#fff; padding:60px 32px 48px; text-align:center; }
    .avatar { width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.25); margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:32px; }
    .hero h1 { font-size:28px; font-weight:800; margin-bottom:6px; }
    .hero .tagline { font-size:15px; opacity:.85; max-width:480px; margin:0 auto; }

    /* SECTIONS */
    .section { max-width:720px; margin:0 auto; padding:40px 24px; }
    .section h2 { font-size:18px; font-weight:700; color:var(--color); margin-bottom:16px; border-bottom:2px solid var(--color); padding-bottom:6px; }
    .section p { font-size:14px; color:#4B5563; line-height:1.7; margin-bottom:12px; }

    /* EXPERTISE */
    .expertise { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
    .expertise-card { background:#fff; border:1px solid #E5E7EB; border-radius:8px; padding:16px; }
    .expertise-card h3 { font-size:14px; font-weight:700; color:var(--color-dark); margin-bottom:6px; }
    .expertise-card p { font-size:13px; color:#6B7280; line-height:1.5; }

    /* HOW I WORK */
    .steps { display:flex; flex-direction:column; gap:12px; }
    .step { display:flex; gap:14px; align-items:flex-start; }
    .step-num { background:var(--color); color:#fff; font-weight:800; font-size:13px; min-width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-top:2px; }
    .step-body h3 { font-size:14px; font-weight:700; margin-bottom:3px; }
    .step-body p { font-size:13px; color:#6B7280; line-height:1.5; }

    /* RESULTS */
    .results { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
    .result-card { background:#fff; border:1px solid #E5E7EB; border-radius:8px; padding:16px; }
    .result-card .outcome { font-size:22px; font-weight:800; color:var(--color); margin-bottom:4px; }
    .result-card h3 { font-size:14px; font-weight:700; margin-bottom:4px; }
    .result-card p { font-size:13px; color:#6B7280; line-height:1.5; }

    /* ASK ME */
    .ask-section { background:#fff; border:1px solid #E5E7EB; border-radius:10px; padding:24px; margin-top:16px; }
    .ask-section p { font-size:13px; color:#6B7280; margin-bottom:16px; }
    .qa-item { background:#F0F9FF; border-left:3px solid var(--color); border-radius:0 6px 6px 0; padding:12px 14px; margin-bottom:10px; }
    .qa-item .q { font-size:13px; font-weight:700; color:#0e7490; margin-bottom:4px; }
    .qa-item .a { font-size:13px; color:#374151; line-height:1.5; }
    .ask-form { display:flex; gap:8px; margin-top:16px; }
    .ask-form input { flex:1; padding:10px 14px; border:1px solid #D1D5DB; border-radius:6px; font-size:14px; }
    .ask-form button { padding:10px 18px; background:var(--color); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }

    .todo-label { display:inline-block; background:#FEF3C7; color:#92400E; font-size:11px; font-weight:700; padding:1px 7px; border-radius:20px; margin-bottom:6px; }
    footer { text-align:center; padding:24px; color:#9CA3AF; font-size:13px; border-top:1px solid #E5E7EB; margin-top:40px; }
  </style>
</head>
